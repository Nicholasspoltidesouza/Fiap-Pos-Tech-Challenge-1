name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and run tests (Testcontainers)
        run: |
          chmod +x ./mvnw
          ./mvnw -B verify
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ciDefaultSecretChangeMeChangeMeChangeMeChangeMe1234567890' }}

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

  docker-image:
    name: Build Docker image
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: oficina-api:latest
          outputs: type=docker,dest=/tmp/oficina-api.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: oficina-api-image
          path: /tmp/oficina-api.tar

  deploy-to-kind:
    name: Deploy to local Kubernetes (kind)
    needs: docker-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: oficina-api-image
          path: /tmp

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: oficina-cluster

      - name: Load image into kind
        run: |
          docker load --input /tmp/oficina-api.tar
          kind load docker-image oficina-api:latest --name oficina-cluster

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl apply -f k8s/01-configmap.yaml
          kubectl apply -f k8s/02-secret.yaml
          kubectl apply -f k8s/03-postgres.yaml
          kubectl apply -f k8s/04-mailhog.yaml
          kubectl apply -f k8s/05-app.yaml
          kubectl apply -f k8s/06-hpa.yaml

      - name: Wait for rollouts
        run: |
          kubectl -n oficina rollout status deployment/postgres --timeout=180s
          kubectl -n oficina rollout status deployment/oficina-api --timeout=240s

      - name: Show deployment state
        if: always()
        run: |
          kubectl -n oficina get all
          kubectl -n oficina describe pods -l app=oficina-api
